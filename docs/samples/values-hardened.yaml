# -----------------------------------------------------------------------------
# This is a sample config. Assumed that:
# - Jitsi domain is meet.example.com
# - It uses hardened containers from
#   https://github.com/jitsi-contrib/hardened-images
# - Read-only filesystems
# - Non-root containers
# -----------------------------------------------------------------------------
#publicURL: ""
publicURL: "https://meet.example.com"

websockets:
  colibri:
    enabled: false
  xmpp:
    #enabled: false
    enabled: true

web:
  image:
    repository: ghcr.io/jitsi-contrib/hardened-images/web

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault

  extraEnvs:
    # https://github.com/just-containers/s6-overlay/issues/600
    S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: "1"

  extraVolumes:
    - name: run
      emptyDir:
        sizeLimit: 32Mi
    - name: tmp
      emptyDir:
        sizeLimit: 32Mi

  extraVolumeMounts:
    - name: run
      mountPath: /run
    - name: tmp
      mountPath: /tmp

  ingress:
    #enabled: false
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: meet.example.com
        paths: ["/"]
    tls:
      - secretName: jitsi-web-tls
        hosts:
          - meet.example.com

  service:
    port: 8000

  livenessProbe:
    httpGet:
      path: /
      port: 8000

  readinessProbe:
    httpGet:
      path: /
      port: 8000

prosody:
  image:
    repository: ghcr.io/jitsi-contrib/hardened-images/prosody

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault

  extraEnvs:
    # https://github.com/just-containers/s6-overlay/issues/600
    S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: "1"

  extraVolumes:
    - name: run
      emptyDir:
        sizeLimit: 32Mi
    - name: tmp
      emptyDir:
        sizeLimit: 32Mi
    - name: storage
      emptyDir:
        sizeLimit: 32Mi

  extraVolumeMounts:
    - name: run
      mountPath: /run
    - name: tmp
      mountPath: /tmp
    - name: storage
      mountPath: /var/lib/prosody

  metrics:
    enabled: false
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault

