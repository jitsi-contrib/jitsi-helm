# -----------------------------------------------------------------------------
# This is a sample config. Assumed that:
# - Jitsi domain is meet.example.com
# - It uses hardened containers from
#   https://github.com/jitsi-contrib/hardened-images
# - Read-only filesystems
# - Non-root containers
# -----------------------------------------------------------------------------
#publicURL: ""
publicURL: "https://meet.example.com"

websockets:
  colibri:
    enabled: false
  xmpp:
    #enabled: false
    enabled: true

web:
  image:
    repository: ghcr.io/jitsi-contrib/hardened-images/web

  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault

  extraVolumes:
    - name: run
      emptyDir:
        sizeLimit: 32Mi
    - name: tmp
      emptyDir:
        sizeLimit: 32Mi

  extraVolumeMounts:
    - name: run
      mountPath: /run
    - name: tmp
      mountPath: /tmp

  ingress:
    #enabled: false
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: meet.example.com
        paths: ["/"]
    tls:
      - secretName: jitsi-tls
        hosts:
          - meet.example.com

  service:
    port: 8000
  livenessProbe:
    httpGet:
      path: /
      port: 8000
  readinessProbe:
    httpGet:
      path: /
      port: 8000

  extraEnvs:
    # https://github.com/just-containers/s6-overlay/issues/600
    S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: "1"

prosody:
  image:
    repository: ghcr.io/jitsi-contrib/hardened-images/prosody

  podSecurityContext:
    fsGroup: 1000
  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault

  metrics:
    enabled: false
    securityContext:
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      seccompProfile:
        type: RuntimeDefault

  extraVolumes:
    - name: run
      emptyDir:
        sizeLimit: 32Mi
    - name: tmp
      emptyDir:
        sizeLimit: 32Mi
    - name: storage
      emptyDir:
        sizeLimit: 32Mi

  extraVolumeMounts:
    - name: run
      mountPath: /run
    - name: tmp
      mountPath: /tmp
    - name: storage
      mountPath: /var/lib/prosody

  extraEnvs:
    # https://github.com/just-containers/s6-overlay/issues/600
    S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: "1"

jicofo:
  image:
    repository: ghcr.io/jitsi-contrib/hardened-images/jicofo

  podSecurityContext:
    fsGroup: 1000
  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault

  metrics:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault

  extraVolumes:
    - name: run
      emptyDir:
        sizeLimit: 32Mi
    - name: tmp
      emptyDir:
        sizeLimit: 32Mi

  extraVolumeMounts:
    - name: run
      mountPath: /run
    - name: tmp
      mountPath: /tmp

  extraEnvs:
    # https://github.com/just-containers/s6-overlay/issues/600
    S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: "1"

jvb:
  image:
    repository: ghcr.io/jitsi-contrib/hardened-images/jvb

  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault

  metrics:
    securityContext:
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      seccompProfile:
        type: RuntimeDefault

  extraVolumes:
    - name: run
      emptyDir:
        sizeLimit: 32Mi
    - name: tmp
      emptyDir:
        sizeLimit: 32Mi

  extraVolumeMounts:
    - name: run
      mountPath: /run
    - name: tmp
      mountPath: /tmp

  #useNodeIP: false
  useNodeIP: true

  #useHostPort: false
  useHostPort: true
  UDPPort: 10000

  service:
    #enabled: true
    enabled: false

  extraEnvs:
    # https://github.com/just-containers/s6-overlay/issues/600
    S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: "1"

jibri:
  enabled: true
  image:
    repository: ghcr.io/jitsi-contrib/hardened-images/jibri
  podSecurityContext:
    fsGroup: 1000
  securityContext:
    capabilities:
      # overwrite default added capability
      add: null
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault
  # mount writable volumes to allow running with readOnlyRootFilesystem (https://github.com/jitsi-contrib/hardened-images)
  extraVolumes:
    - name: tmp
      emptyDir: { }
    - name: run
      emptyDir: { }
    - name: storage
      emptyDir: { }
  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: run
      mountPath: /run
    - name: storage
      mountPath: /storage
  extraEnvs:
    S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: "1"
  shm:
    enabled: true
    useHost: false
    size: 2Gi

jigasi:
  image:
    repository: ghcr.io/jitsi-contrib/hardened-images/jigasi
  podSecurityContext:
    fsGroup: 1000
  securityContext:
    capabilities:
      # overwrite default added capability
      add: null
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault
  # mount writable volumes to allow running with readOnlyRootFilesystem (https://github.com/jitsi-contrib/hardened-images)
  extraVolumes:
    - name: tmp
      emptyDir: { }
    - name: run
      emptyDir: { }
    - name: storage
      emptyDir: { }
  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: run
      mountPath: /run
    - name: storage
      mountPath: /storage
  extraEnvs:
    S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: "1"
  initContainers:
    busybox:
      securityContext:
        capabilities:
          # overwrite default added capability
          add: null
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault

transcriber:
  image:
    repository: ghcr.io/jitsi-contrib/hardened-images/jigasi
  podSecurityContext:
    fsGroup: 1000
  securityContext:
    capabilities:
      # overwrite default added capability
      add: null
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault
  initContainers:
    busybox:
      securityContext:
        capabilities:
          # overwrite default added capability
          add: null
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
  # mount writable volumes to allow running with readOnlyRootFilesystem (https://github.com/jitsi-contrib/hardened-images)
  extraVolumes:
    - name: tmp
      emptyDir: { }
    - name: run
      emptyDir: { }
    - name: storage
      emptyDir: { }
  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: run
      mountPath: /run
    - name: storage
      mountPath: /storage
  extraEnvs:
    S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: "1"

excalidraw:
  enabled: true
  metrics:
    enabled: true
  podSecurityContext:
    fsGroup: 1000
  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: false
    runAsUser: 1000
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault
  # update port to sth. > 1024
  livenessProbe:
    httpGet:
      path: /
      port: 8080
  readinessProbe:
    httpGet:
      path: /
      port: 8080
  service:
    port: 8080
  extraEnvs:
    PORT: "8080"
  # in readOnly environments, excalidraw needs write permission to following folder
  extraVolumes:
    - name: dist
      emptyDir:
        sizeLimit: 32Mi
  extraVolumeMounts:
    - name: dist
      mountPath: /excalidraw-backend/dist
