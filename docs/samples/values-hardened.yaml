jvb:
  image:
    repository: ghcr.io/jitsi-contrib/hardened-images/jvb

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault

  extraEnvs:
    # https://github.com/just-containers/s6-overlay/issues/600
    S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: "1"

  extraVolumes:
    - name: run
      emptyDir:
        sizeLimit: 32Mi
    - name: tmp
      emptyDir:
        sizeLimit: 32Mi

  extraVolumeMounts:
    - name: run
      mountPath: /run
    - name: tmp
      mountPath: /tmp

  #useNodeIP: false
  useNodeIP: true

  #useHostPort: false
  useHostPort: true
  UDPPort: 10000

  service:
    #enabled: true
    enabled: false

  metrics:
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault

jibri:
  enabled: true
  image:
    repository: ghcr.io/jitsi-contrib/hardened-images/jibri

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      # overwrite default added capability
      add: null
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault

  extraEnvs:
    S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: "1"

  # mount writable volumes to allow running with readOnlyRootFilesystem
  # https://github.com/jitsi-contrib/hardened-images
  extraVolumes:
    - name: tmp
      emptyDir: {}
    - name: run
      emptyDir: {}
    - name: storage
      emptyDir: {}

  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: run
      mountPath: /run
    - name: storage
      mountPath: /storage

  shm:
    enabled: true
    useHost: false
    size: 2Gi

jigasi:
  image:
    repository: ghcr.io/jitsi-contrib/hardened-images/jigasi

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      # overwrite default added capability
      add: null
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault

  extraEnvs:
    S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: "1"

  # mount writable volumes to allow running with readOnlyRootFilesystem
  # https://github.com/jitsi-contrib/hardened-images
  extraVolumes:
    - name: tmp
      emptyDir: {}
    - name: run
      emptyDir: {}
    - name: storage
      emptyDir: {}

  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: run
      mountPath: /run
    - name: storage
      mountPath: /storage

  initContainers:
    busybox:
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          # overwrite default added capability
          add: null
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault

